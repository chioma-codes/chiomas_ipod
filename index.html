<body>
    <script type="module" src="/src/main.js"></script>
    <div id="info-box">
      <h2>Now Playing in Chioma's Ears</h2>
      <iframe id="spotify-embed" src="" width="100%" height="80" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
      <div id="info-content">
        <img id="info-album-art" src="" alt="album art"/>
        <div id="info-text">
          <p><span class="label">Song:</span> <span id="info-song"></span></p>
          <p><span class="label">Artist:</span> <span id="info-artist"></span></p>
          <p><span class="label">Album:</span> <span id="info-album"></span></p>
          <p><span class="label">Genre:</span> <span id="info-genre"></span></p>
        </div>
      </div>
    </div>
  </body>
