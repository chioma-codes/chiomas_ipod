<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What's Chioma Listening To?</title>
  </head>
  <body>
    <script type="module" src="/src/main.js"></script>
    <h2 id="main-title">What Chioma is currently listening to</h2>
    <div id="info-box">
      <div id="info-content">
        <img id="info-album-art" src="" alt="album art"/>
        <div id="info-text">
          <p><span class="label">Song:</span> <span id="info-song"></span></p>
          <p><span class="label">Artist:</span> <span id="info-artist"></span></p>
          <p><span class="label">Album:</span> <span id="info-album"></span></p>
          <p><span class="label">Genre:</span> <span id="info-genre"></span></p>
        </div>
      </div>
    <iframe id="spotify-embed" src="" width="100%" height="52" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" style="border-radius: 8px; margin-top: 12px;"></iframe>
    </div>
  </body>
</html>
